name: Publish

permissions:
  contents: write
  discussions: write
  id-token: write

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      - run: yarn install
      - run: yarn build
      - if: "github.event.release.prerelease"
        run: npm publish --provenance --tag beta
      - if: "github.event.release.prerelease"
        run: cd src/server/function/twikoo && npm publish --provenance --tag beta
      - if: "github.event.release.prerelease"
        run: cd src/server/vercel && npm publish --provenance --tag beta
      - if: "github.event.release.prerelease"
        run: cd src/server/self-hosted && npm publish --provenance --tag beta
      - if: "github.event.release.prerelease"
        run: cd src/server/netlify && npm publish --provenance --tag beta
      - if: "!github.event.release.prerelease"
        run: npm publish --provenance
      - if: "!github.event.release.prerelease"
        run: cd src/server/function/twikoo && npm publish --provenance
      - if: "!github.event.release.prerelease"
        run: cd src/server/vercel && npm publish --provenance
      - if: "!github.event.release.prerelease"
        run: cd src/server/self-hosted && npm publish --provenance
      - if: "!github.event.release.prerelease"
        run: cd src/server/netlify && npm publish --provenance

  publish-docker:
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      -
        name: Get twikoo:latest version
        run: echo "TWIKOO_LATEST_VERSION=$(npm view twikoo@latest version)" >> "$GITHUB_ENV"
      -
        name: Build and push amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            imaegoo/twikoo:latest
            imaegoo/twikoo:${{ env.TWIKOO_LATEST_VERSION }}
      -
        name: Build and push arm32v7 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm/v7
          push: true
          tags: |
            imaegoo/twikoo:arm32v7
            imaegoo/twikoo:${{ env.TWIKOO_LATEST_VERSION }}-arm32v7
          build-args: NODE_IMAGE=arm32v7/node

  publish-pkg:
    needs: publish-npm
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: get tkserver version
        run: |
          echo "TKSERVER_VERSION=$(npm view tkserver@latest version)" >> "$GITHUB_ENV"

      - if: '!github.event.release.prerelease'
        run: |
          cd src/server/pkg
          npm i
          npm i tkserver@${{ env.TKSERVER_VERSION }}
          npm run build:exe

      - name: Release
        uses: softprops/action-gh-release@v2
        if: '!github.event.release.prerelease'
        with:
          files: |
            src/server/pkg/dist/*
